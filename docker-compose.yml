services:
  iris:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - ISC_CPF_MERGE_FILE=/home/irisowner/dev/merge.cpf
    ports:
      - "19720:1972"
      - "52780:52773"
      - "53780:53773"
    volumes:
      # Only the output directory is bind-mounted. Nothing is
      # precomputed — see README "Runtime input location".
      - ./data/out:/home/irisowner/dev/data/out
